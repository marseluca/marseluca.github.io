<style>
:root{
  --blu:#16365c;--blu-scuro:#0d2440;--giallo:#f0b429;
  --carta:#f6f4ee;--bianco:#ffffff;--inchiostro:#1c2430;
  --grigio:#7a8494;--bordo:#e2ddd2;--verde:#2e7d32;
  --ombra:0 2px 12px rgba(13,36,64,.14);
  --barra-h:58px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  height:100dvh;font-family:'Archivo',sans-serif;color:var(--inchiostro);
  display:flex;flex-direction:column;overflow:hidden;background:var(--carta);
}
#mappa{flex:1;min-height:0;position:relative;z-index:1}
.leaflet-container{background:#e8e4da;font-family:'Archivo',sans-serif}
.mappa-crosshair .leaflet-container{cursor:crosshair}

/* ---------- barra inferiore ---------- */
.barra{
  flex:none;height:calc(var(--barra-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--bianco);border-top:1px solid var(--bordo);
  display:flex;z-index:1200;
}
.barra button{
  flex:1;border:0;background:none;cursor:pointer;
  font-family:'Archivo',sans-serif;font-size:.62rem;font-weight:600;
  color:var(--grigio);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  transition:color .15s;
}
.barra button svg{width:21px;height:21px}
.barra button.sel,.barra button:hover{color:var(--blu)}
.barra button.sel{position:relative}
.barra button.sel::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:3px;
  background:var(--giallo);border-radius:0 0 3px 3px;
}
.barra #btnGps.attivo{color:var(--giallo)}
.barra button:focus-visible{outline:2px solid var(--blu);outline-offset:-2px}

/* ---------- scheda (bottom sheet / pannello laterale) ---------- */
.scheda{
  position:absolute;z-index:1100;background:var(--carta);
  display:flex;flex-direction:column;
  left:0;right:0;bottom:calc(var(--barra-h) + env(safe-area-inset-bottom));
  max-height:64dvh;border-radius:16px 16px 0 0;
  box-shadow:0 -4px 22px rgba(13,36,64,.18);
  transform:translateY(110%);transition:transform .28s cubic-bezier(.32,.72,.28,1);
  visibility:hidden;
}
.scheda.aperto{transform:translateY(0);visibility:visible}
.scheda-testa{
  flex:none;display:flex;align-items:center;gap:10px;
  padding:10px 16px 8px;border-bottom:1px solid var(--bordo);
}
.maniglia{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:36px;height:4px;border-radius:2px;background:var(--bordo);
}
.scheda-testa h2{
  font-family:'Fraunces',serif;font-size:1.02rem;color:var(--blu);
  flex:1;padding-top:4px;
}
.chiudi-scheda{
  border:0;background:none;cursor:pointer;color:var(--grigio);
  font-size:1.3rem;line-height:1;padding:4px 6px;border-radius:6px;
}
.chiudi-scheda:hover{color:var(--blu)}
.scheda-corpo{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.vista{display:none;padding-bottom:12px}
.vista.aperto{display:block}

/* ---------- sezioni richiudibili ---------- */
.sezione{border-bottom:1px solid var(--bordo)}
.titolo-sez{
  font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--grigio);padding:10px 16px 4px;
}
.titolo-sez.collass{
  display:flex;width:100%;justify-content:space-between;align-items:center;
  background:none;border:0;cursor:pointer;
  font-family:'Archivo',sans-serif;padding:12px 16px;
  transition:color .15s,background .15s;
}
.titolo-sez.collass:hover{color:var(--blu);background:#efece3}
.titolo-sez.collass .freccia{font-size:.85rem;transition:transform .18s}
.titolo-sez.collass[aria-expanded="true"] .freccia{transform:rotate(90deg)}
.corpo-sez{padding-bottom:6px}
.corpo-sez.chiuso{display:none}
.azioni{display:flex;gap:6px;padding:6px 16px 8px;flex-wrap:wrap}
.azioni button{
  font-family:'Archivo',sans-serif;font-size:.72rem;font-weight:600;
  padding:6px 12px;border:1px solid var(--bordo);border-radius:16px;
  background:var(--bianco);color:var(--inchiostro);cursor:pointer;
  transition:border-color .15s,color .15s;
}
.azioni button:hover{border-color:var(--blu);color:var(--blu)}

/* ---------- righe: quartieri, livelli, liste ---------- */
.voce{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:9px 16px;border:0;background:none;cursor:pointer;
  font-family:'Archivo',sans-serif;font-size:.86rem;color:var(--inchiostro);
}
.voce:hover{background:#efece3}
.voce:focus-visible{outline:2px solid var(--blu);outline-offset:-2px}
.voce.attiva{background:var(--blu);color:var(--carta)}
.voce.spento{opacity:.5}
.swatch{width:12px;height:12px;border-radius:3px;flex:none;border:1px solid rgba(0,0,0,.18)}
.voce .occhio{margin-left:auto;flex:none;width:18px;height:18px;cursor:pointer;accent-color:var(--blu)}
.riga-toret{
  display:flex;align-items:center;gap:10px;padding:9px 16px;
  font-size:.86rem;cursor:pointer;
}
.riga-toret:hover{background:#efece3}

/* ---------- controlli nei pannelli ---------- */
.blocco{padding:10px 16px 4px}
.opzione-mappa{

  padding:10px 12px;cursor:pointer;margin-bottom:10px;color:var(--inchiostro);
  transition:border-color .15s,color .15s;
}
.opzione-mappa:hover{border-color:var(--blu);color:var(--blu)}
.riga-indirizzo{display:flex;gap:6px;margin-bottom:6px}
input[type=text]{
  flex:1;min-width:0;font-family:'Archivo',sans-serif;font-size:16px;
  padding:8px 10px;border:1px solid var(--bordo);border-radius:8px;background:var(--bianco);
}
select{
  width:100%;font-family:'Archivo',sans-serif;font-size:16px;
  padding:8px 10px;border:1px solid var(--bordo);border-radius:8px;
  background:var(--bianco);margin-bottom:6px;
}
.cerca{
  font-family:'Archivo',sans-serif;font-size:.78rem;font-weight:600;
  background:var(--blu);color:#fff;border:0;border-radius:8px;padding:0 14px;cursor:pointer;
}
.cerca:disabled{opacity:.5;cursor:wait}
.risultati{max-height:170px;overflow-y:auto}
.risultati .ris{
  display:block;width:100%;text-align:left;background:none;border:0;cursor:pointer;
  font-family:'Archivo',sans-serif;font-size:.76rem;color:var(--inchiostro);
  padding:7px 8px;border-radius:6px;line-height:1.35;
}
.risultati .ris:hover{background:#efece3}
.risultati .vuoto{font-size:.75rem;color:var(--grigio);padding:6px 4px}
.separatore{
  display:flex;align-items:center;gap:8px;margin:10px 16px;
  font-size:.68rem;color:var(--grigio);text-transform:uppercase;letter-spacing:.06em;
}
.separatore::before,.separatore::after{content:'';flex:1;height:1px;background:var(--bordo)}
.riga-tappa{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.riga-tappa select{flex:1;margin-bottom:0}
.riga-tappa .togli{
  flex:none;width:30px;height:30px;border:1px solid var(--bordo);border-radius:8px;

}

.profili{display:flex;gap:4px;margin:6px 0 10px}
.profili button{
  flex:1;font-family:'Archivo',sans-serif;font-size:.74rem;font-weight:600;
  padding:7px 0;border:1px solid var(--bordo);border-radius:8px;background:var(--bianco);

}
.profili button.sel{background:var(--blu);color:#fff;border-color:var(--blu)}
.calcola{
  width:100%;font-family:'Archivo',sans-serif;font-size:.82rem;font-weight:600;
  background:var(--giallo);color:var(--blu-scuro);border:0;border-radius:8px;

}
.calcola:disabled{opacity:.5;cursor:wait}
.esito{margin-top:6px;font-size:.82rem;line-height:1.5}
.esito strong{color:var(--blu);font-variant-numeric:tabular-nums}
.pulisci{

}

/* ---------- overlay sulla mappa ---------- */
.pannello-info{
  position:absolute;left:12px;top:12px;z-index:1000;
  background:var(--carta);border:1px solid var(--bordo);border-left:4px solid var(--giallo);

}

.carta-meteo{
  position:absolute;left:50%;transform:translateX(-50%);top:12px;z-index:1000;
  background:var(--carta);border:1px solid var(--bordo);border-left:4px solid #5dade2;

.pill-annulla{
  position:absolute;left:50%;transform:translateX(-50%);top:12px;z-index:1250;
  background:var(--blu);color:var(--carta);border:0;border-radius:20px;cursor:pointer;
  font-family:'Archivo',sans-serif;font-size:.78rem;font-weight:600;
  padding:9px 16px;box-shadow:var(--ombra);display:none;
}
.toast{
  position:absolute;left:50%;transform:translateX(-50%);
  bottom:14px;z-index:1300;
  background:var(--blu-scuro);color:var(--carta);
  font-size:.78rem;padding:9px 14px;border-radius:8px;
  box-shadow:0 3px 12px rgba(13,36,64,.35);
  max-width:86%;text-align:center;display:none;
}
.etichetta{
  background:none;border:none;box-shadow:none;
  font-family:'Archivo',sans-serif;font-weight:600;font-size:.68rem;
  color:var(--blu-scuro);text-shadow:0 1px 2px rgba(246,244,238,.9),0 -1px 2px rgba(246,244,238,.9);
  pointer-events:none;text-align:center;white-space:nowrap;
}
.etichetta-luogo{
  background:none;border:none;box-shadow:none;
  font-family:'Archivo',sans-serif;font-weight:700;font-size:.7rem;
  color:var(--blu-scuro);text-shadow:0 1px 2px #fff,0 -1px 2px #fff;white-space:nowrap;
  pointer-events:none;
}
.pin-luogo{
  background:var(--giallo);border:2px solid var(--blu-scuro);border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);width:18px!important;height:18px!important;
  box-shadow:0 1px 4px rgba(13,36,64,.4);
}
.punto-gps{
  width:16px!important;height:16px!important;border-radius:50%;
  background:#2a6fdb;border:3px solid #fff;
  box-shadow:0 0 0 2px rgba(42,111,219,.4),0 1px 4px rgba(13,36,64,.4);
}
.popup-luogo input{
  font-family:'Archivo',sans-serif;font-size:16px;padding:5px 8px;
  border:1px solid var(--bordo);border-radius:4px;width:160px;
}
.popup-luogo button{

}
.popup-luogo .salva{background:var(--blu);color:#fff}
.popup-luogo .elimina{background:#f3e2e2;color:#8a3a3a}

/* su basemap scure: etichette chiare e heatmap in blend screen */
.base-scura .etichetta{color:#f5f2e8;text-shadow:0 1px 3px rgba(13,20,30,.95),0 -1px 3px rgba(13,20,30,.95)}
.base-scura .etichetta-luogo{color:#f5f2e8;text-shadow:0 1px 3px rgba(13,20,30,.95),0 -1px 3px rgba(13,20,30,.95)}
.base-scura .leaflet-heatmap-layer{mix-blend-mode:screen;opacity:.7}
.leaflet-heatmap-layer{opacity:.78;mix-blend-mode:multiply;filter:saturate(1.25)}

/* ---------- desktop: scheda laterale, barra a pillola ---------- */
@media (min-width:681px){

  #mappa{height:100dvh}
  .barra button{padding:0 20px}
  .toast{bottom:88px}
}
@media (max-width:680px){
  .barra{position:relative}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important}
}

const PALETTE = ['#4a6fa5','#c9803a','#6f8f5a','#a05a6e','#5a8f8a','#8a7a4a',
                 '#7a6aa0','#b06a4a','#5a7a9f','#94804f','#6a9a7a','#a06a8a',
                 '#4a8aa5','#c99a3a','#7f6f55','#8a5a5a','#5a6f8f','#9a8a6a',
                 '#6a8aa0','#a5764a','#5f8f6f','#8f6a9a','#4f7a8f'];

const mappa = L.map('mappa',{zoomSnap:.25,zoomDelta:.5,wheelPxPerZoomLevel:90,maxZoom:20,zoomControl:false});
const BASEMAPS={
  chiaro:{nome:'Chiara',url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    opt:{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:20,maxNativeZoom:19,updateWhenZooming:true,keepBuffer:4},scura:false},
  voyager:{nome:'Voyager (stradale)',url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    opt:{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:20,maxNativeZoom:19,updateWhenZooming:true,keepBuffer:4},scura:false},
  scuro:{nome:'Scura',url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    opt:{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:20,maxNativeZoom:19,updateWhenZooming:true,keepBuffer:4},scura:true},
  osm:{nome:'OSM classica',url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    opt:{attribution:'&copy; OpenStreetMap',maxZoom:19,maxNativeZoom:19},scura:false},
  satellite:{nome:'Satellite',url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    opt:{attribution:'Esri, Maxar, Earthstar Geographics',maxZoom:19,maxNativeZoom:19},scura:true}
};
let baseAttiva='chiaro';
let baseLayer=L.tileLayer(BASEMAPS.chiaro.url,BASEMAPS.chiaro.opt).addTo(mappa);
function cambiaBasemap(chiave){
  if(chiave===baseAttiva||!BASEMAPS[chiave]) return;
  mappa.removeLayer(baseLayer);
  baseLayer=L.tileLayer(BASEMAPS[chiave].url,BASEMAPS[chiave].opt).addTo(mappa);
  baseAttiva=chiave;
  document.body.classList.toggle('base-scura',BASEMAPS[chiave].scura);
}

const colore={},layers={},voci={},etichette={};
DATI.features.sort((a,b)=>a.properties.id-b.properties.id)
  .forEach((f,i)=>colore[f.properties.id]=PALETTE[i%PALETTE.length]);

let attivo=null;

function opacita(){
  const z=mappa.getZoom()||12;
  return z>=16?.18:z>=14?.32:.5;
}
function stile(f,sel){
  return {color:sel?'#0d2440':'#ffffff',weight:sel?2.5:1.2,
          fillColor:colore[f.properties.id],fillOpacity:sel?.72:opacita()};
}

const layer=L.geoJSON(DATI,{
  smoothFactor:0,
  style:f=>stile(f,false),
  onEachFeature:(f,ly)=>{
    layers[f.properties.id]=ly;
    ly.bindTooltip(f.properties.nome,{sticky:true,direction:'top'});
    ly.on('mouseover',()=>{ if(f.properties.id!==attivo) ly.setStyle({fillOpacity:.68,weight:2}); });
    ly.on('mouseout',()=>{ if(f.properties.id!==attivo) ly.setStyle(stile(f,false)); });
    ly.on('click',()=>{ if(!addMode) seleziona(f.properties.id,true); });
  }
}).addTo(mappa);
mappa.fitBounds(layer.getBounds(),{padding:[10,10]});

mappa.on('zoomend',()=>{
  const fo=opacita();
  layer.eachLayer(ly=>{
    if(ly.feature.properties.id!==attivo) ly.setStyle({fillOpacity:fo});
  });
});

// etichette al centroide
DATI.features.forEach(f=>{
  const b=layers[f.properties.id].getBounds();
  etichette[f.properties.id]=L.marker(b.getCenter(),{
    icon:L.divIcon({className:'etichetta',html:f.properties.nome,iconSize:null}),interactive:false
  }).addTo(mappa);
});

// ---------- menu opzioni ----------
const btnMenu=document.getElementById('btnMenu');
const menu=document.getElementById('menu');

// i pannelli sono sovrapposti alla mappa: senza questo, rotella e trascinamento
// arrivano a Leaflet (zoom/pan della mappa) invece di scorrere il pannello
['menu','info','btnGps','toast','pillAnnulla','cartaMeteo']
  .forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    L.DomEvent.disableClickPropagation(el);
    L.DomEvent.disableScrollPropagation(el);
  });
document.querySelectorAll('.pila-sx').forEach(el=>{
  L.DomEvent.disableClickPropagation(el);
});

// ---- scheda con tre viste (Livelli / Luoghi / Percorso) ----
const TITOLI_VISTE={livelli:'Filtri e livelli',luoghi:'I miei luoghi',percorso:'Percorsi e isocrone'};
const VISTE={livelli:document.getElementById('vistaLivelli'),
             luoghi:document.getElementById('pannelloLuogo'),
             percorso:document.getElementById('pannelloRotta')};
const TABS={livelli:btnMenu,
            luoghi:document.getElementById('btnLuogo'),
            percorso:document.getElementById('btnDistanza')};
let vistaAttiva=null;
function apriVista(n){
  Object.keys(VISTE).forEach(k=>{
    VISTE[k].classList.toggle('aperto',k===n);
    TABS[k].classList.toggle('sel',k===n);
  });
  document.getElementById('titoloScheda').textContent=TITOLI_VISTE[n];
  menu.classList.add('aperto');
  vistaAttiva=n;
}
function chiudiVista(){
  menu.classList.remove('aperto');
  Object.keys(TABS).forEach(k=>TABS[k].classList.remove('sel'));
  vistaAttiva=null;
}
function toggleVista(n){ vistaAttiva===n ? chiudiVista() : apriVista(n); }
document.getElementById('chiudiPannello').onclick=chiudiVista;
btnMenu.onclick=()=>toggleVista('livelli');

// rimuove tutti i filtri attivi (quartieri e livelli)
document.getElementById('btnResetFiltri').onclick=()=>{
  DATI.features.forEach(f=>impostaVisibile(f.properties.id,false));
  document.querySelectorAll('.riga-toret input:checked').forEach(c=>{
    c.checked=false;
    c.dispatchEvent(new Event('change'));
  });
  mostraToast('Tutti i filtri rimossi.');
};

// sezioni del menu richiudibili (tutte chiuse all'apertura)
document.querySelectorAll('.titolo-sez.collass').forEach(b=>{
  const corpo=document.getElementById(b.dataset.corpo);
  b.onclick=()=>{
    const aperto=corpo.classList.toggle('chiuso')===false;
    b.setAttribute('aria-expanded',aperto);
  };
});

// ---------- lista quartieri con visibilita ----------
const visibile={};
const nav=document.getElementById('lista');
const info=document.getElementById('info');

DATI.features.slice().sort((a,b)=>a.properties.nome.localeCompare(b.properties.nome,'it'))
  .forEach(f=>{
    const id=f.properties.id;
    const b=document.createElement('button');
    b.className='voce';
    b.innerHTML=`<span class="swatch" style="background:${colore[id]}"></span>
                 <span>${f.properties.nome}</span>`;
    const chk=document.createElement('input');
    chk.type='checkbox';chk.checked=true;chk.className='occhio';
    chk.title='Mostra/nascondi sulla mappa';
    chk.onclick=e=>{e.stopPropagation();impostaVisibile(id,chk.checked);};
    b.appendChild(chk);
    b.onclick=()=>{ if(!visibile[id]) impostaVisibile(id,true); seleziona(id,true); };
    voci[id]=b;
    nav.appendChild(b);
  });

function impostaVisibile(id,on){
  visibile[id]=on;
  const ly=layers[id],et=etichette[id],v=voci[id];
  if(on){ ly.addTo(mappa); et.addTo(mappa); v.classList.remove('spento'); }
  else{
    mappa.removeLayer(ly); mappa.removeLayer(et); v.classList.add('spento');
    if(attivo===id){ v.classList.remove('attiva'); attivo=null; info.style.display='none'; }
  }
  v.querySelector('.occhio').checked=on;
}
document.getElementById('btnTutti').onclick=()=>DATI.features.forEach(f=>impostaVisibile(f.properties.id,true));
document.getElementById('btnNessuno').onclick=()=>DATI.features.forEach(f=>impostaVisibile(f.properties.id,false));

// all'avvio: tutti nascosti
DATI.features.forEach(f=>impostaVisibile(f.properties.id,false));

function seleziona(id,zoom){
  if(attivo!==null){
    layers[attivo].setStyle(stile({properties:{id:attivo}},false));
    voci[attivo].classList.remove('attiva');
  }
  attivo=id;
  layers[id].setStyle(stile({properties:{id}},true));
  layers[id].bringToFront();
  voci[id].classList.add('attiva');
  voci[id].scrollIntoView({block:'nearest'});
  if(zoom) mappa.flyToBounds(layers[id].getBounds(),{padding:[40,40],duration:.6});
  info.style.display='block';
  info.querySelector('h2').textContent=DATI.features.find(f=>f.properties.id===id).properties.nome;
  info.querySelector('p').textContent='Quartiere n. '+String(id).padStart(2,'0');
}

// ---- liste personalizzate ----
const CHIAVE_LISTE='torino_quartieri_liste';
const COLORI_LISTE=['#e74c3c','#8e44ad','#2980b9','#16a085','#f39c12','#d35400','#2c3e50','#c2185b','#00897b','#5e35b1'];
let liste=[];

function salvaListe(){
  try{ localStorage.setItem(CHIAVE_LISTE,JSON.stringify(liste)); }catch(e){}
}
function creaLista(nome){
  const l={id:'l'+Date.now(),nome,colore:COLORI_LISTE[liste.length%COLORI_LISTE.length]};
  liste.push(l); salvaListe(); rigeneraMenuListe();
  return l;
}
function coloreLuogo(l){
  const li=l.listaId && liste.find(x=>x.id===l.listaId);
  return li?li.colore:'#f0b429'; // giallo di default per i luoghi senza lista
}
function chiaveVis(l){
  return (l.listaId && liste.some(x=>x.id===l.listaId))?l.listaId:'';
}

// visibilita per lista ('' = luoghi senza lista); tutto spento al primo accesso
const visListe={};

const gruppoLuoghi=L.layerGroup().addTo(mappa); // vuoto finche nessuna lista e visibile

function disegnaLuogo(l){
  const col=coloreLuogo(l);
  const icona=L.divIcon({
    className:'',
    html:`<div class="pin-luogo" style="background:${col};margin:4px"></div>`,
    iconSize:[26,26],iconAnchor:[13,22],popupAnchor:[0,-20]
  });
  const m=L.marker([l.lat,l.lng],{icon:icona,riseOnHover:true}).addTo(gruppoLuoghi);
  L.marker([l.lat,l.lng],{icon:L.divIcon({className:'etichetta-luogo',html:l.nome,iconSize:null,iconAnchor:[-6,6]}),interactive:false}).addTo(gruppoLuoghi);
  m.bindPopup(()=>{
    const div=document.createElement('div');
    div.className='popup-luogo';
    const opzioni=['<option value="">Nessuna lista</option>']
      .concat(liste.map(x=>`<option value="${x.id}"${x.id===l.listaId?' selected':''}>${x.nome}</option>`))
      .join('');
    div.innerHTML=`<input type="text" value="${l.nome.replace(/"/g,'&quot;')}"><br>
      <select style="margin-top:6px;width:100%;font-size:16px;padding:4px">${opzioni}</select><br>
      <button class="salva" type="button">Salva</button>
      <button class="elimina" type="button">Elimina</button>`;
    div.querySelector('.salva').onclick=()=>{
      const n=div.querySelector('input').value.trim();
      const nuovaLista=div.querySelector('select').value||null;
      if(n){
        l.nome=n; l.listaId=nuovaLista;
        salvaLuoghi(); m.closePopup();
        attivaVisibilita(chiaveVis(l));
        ridisegnaLuoghi();
      }
    };
    div.querySelector('.elimina').onclick=()=>{
      luoghi=luoghi.filter(x=>x.id!==l.id); salvaLuoghi(); ridisegnaLuoghi();
    };
    return div;
  });
}
function ridisegnaLuoghi(){
  gruppoLuoghi.clearLayers();
  luoghi.filter(l=>visListe[chiaveVis(l)]).forEach(disegnaLuogo);
}

// ---- esporta / importa / condividi luoghi e liste ----
function uniscoDati(d){
  let nl=0,np=0;
  (d.liste||[]).forEach(x=>{ if(x&&x.id&&!liste.some(y=>y.id===x.id)){ liste.push(x); nl++; } });
  (d.luoghi||[]).forEach(x=>{ if(x&&x.id&&!luoghi.some(y=>y.id===x.id)){ luoghi.push(x); np++; } });
  salvaListe(); salvaLuoghi(); rigeneraMenuListe(); ridisegnaLuoghi();
  return {nl,np};
}
document.getElementById('btnEsporta').onclick=()=>{
  const blob=new Blob([JSON.stringify({liste,luoghi},null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='torino_luoghi.json';
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById('btnImporta').onclick=()=>document.getElementById('fileImport').click();
document.getElementById('fileImport').onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const {nl,np}=uniscoDati(JSON.parse(rd.result));
      mostraToast('Importati '+np+' luoghi e '+nl+' liste (i duplicati sono stati saltati).');
    }catch(err){ mostraToast('File non valido.'); }
    e.target.value='';
  };
  rd.readAsText(f);
};

  const dati=btoa(unescape(encodeURIComponent(JSON.stringify({liste,luoghi}))));
  const url=location.origin!=='null'
    ? location.origin+location.pathname+'#dati='+dati
    : location.href.split('#')[0]+'#dati='+dati;

  }catch(e){

    mostraToast('Copia automatica non riuscita: il link \u00e8 ora nella barra degli indirizzi.');

// import automatico da link condiviso
(function(){

  let listaId=document.getElementById('selLista').value||null;

// ---------- livelli OpenStreetMap (Overpass) ----------
// loader generico con cache locale di 30 giorni
function livelloOsm(cfg){
  const chk=document.getElementById(cfg.chk);
  let lay=null, tsDati=null;
  function dataAggiornamento(){
    if(!tsDati) return '';
    const d=new Date(tsDati);
    return isNaN(d)?'':' \u00b7 dati OSM aggiornati al '+d.toLocaleDateString('it-IT');
  }
  chk.onchange=async()=>{
    if(!chk.checked){
      if(lay) mappa.removeLayer(lay);
      return;
    }
    if(!lay){
      let dati=null;
      try{
        const c=JSON.parse(localStorage.getItem(cfg.cache)||'null');
        if(c && Date.now()-c.t < 30*24*3600*1000){ dati=c.d; tsDati=c.ts||c.t; }
      }catch(e){}
      if(!dati){
        mostraToast(cfg.caricamento);
        chk.disabled=true;
        try{
          const r=await fetch('https://overpass-api.de/api/interpreter',{
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body:'data='+encodeURIComponent(cfg.query)
          });
          const j=await r.json();
          dati=cfg.estrai(j.elements);
          // timestamp dei dati OSM restituito da Overpass
          tsDati=(j.osm3s&&j.osm3s.timestamp_osm_base)||Date.now();
          try{localStorage.setItem(cfg.cache,JSON.stringify({t:Date.now(),d:dati,ts:tsDati}));}catch(e){}
        }catch(e){
          chk.disabled=false;chk.checked=false;
          mostraToast('Download non riuscito: controlla la connessione e riprova.');
          return;
        }
        chk.disabled=false;
      }
      lay=cfg.costruisci?cfg.costruisci(dati):L.layerGroup(dati.map(cfg.marker));
      mostraToast(cfg.toast(dati.length)+dataAggiornamento());
    }else{
      const n=lay.getLayers?lay.getLayers().length:(lay._quanti||0);
      mostraToast(cfg.toast(n)+dataAggiornamento());
    }
    lay.addTo(mappa);
  };
}

const rendOsm=L.canvas({padding:.3});
const BBOX='(44.99,7.52,45.15,7.79)';
// per way e relation Overpass restituisce il centro con "out center"
function coordCentro(x){
  const la=x.lat!==undefined?x.lat:(x.center&&x.center.lat);
  const lo=x.lon!==undefined?x.lon:(x.center&&x.center.lon);
  return (la!==undefined&&lo!==undefined)?[+la.toFixed(6),+lo.toFixed(6)]:null;
}

  caricamento:'Scarico i tor\u00e8t da OpenStreetMap\u2026',
  query:'[out:json][timeout:25];node["amenity"="drinking_water"]'+BBOX+';out qt;',
  estrai:el=>el.map(e=>[
    +e.lat.toFixed(6),+e.lon.toFixed(6),
    (e.tags&&(e.tags.fountain==='toret'||e.tags['drinking_water:type']==='toret'))?1:0
  ]),
  marker:p=>L.circleMarker([p[0],p[1]],{
    renderer:rendOsm,radius:4,color:'#1b5e20',weight:1.5,
    fillColor:p[2]?'#2e7d32':'#66bb6a',fillOpacity:.9
  }).bindTooltip(p[2]?'Tor\u00e8t':'Fontanella'),
  toast:n=>n+' punti acqua caricati (verde scuro: tor\u00e8t censiti)'
});

// estrattore comune: punti (o centri di aree) con nome opzionale
function estraiPunti(fallback){
  return el=>el.map(x=>{
    const c=coordCentro(x);
    return c?[c[0],c[1],(x.tags&&x.tags.name)||fallback]:null;
  }).filter(Boolean);
}
function markerPunto(opt){
  return p=>L.circleMarker([p[0],p[1]],Object.assign({renderer:rendOsm,weight:1.5,fillOpacity:.9},opt))
    .bindTooltip(p[2]);
}

// estrattore per livelli lineari (way con geometria completa)
function estraiLinee(el){
  return el
    .filter(x=>x.type==='way'&&x.geometry&&x.geometry.length>1)
    .map(x=>x.geometry.map(g=>[+g.lat.toFixed(5),+g.lon.toFixed(5)]));
}
function markerLinea(opt,nome){
  return pts=>L.polyline(pts,Object.assign({renderer:rendOsm,lineCap:'round'},opt))
    .bindTooltip(nome,{sticky:true});
}

// costruttore condiviso per le heatmap: raggio e sfocatura sono in pixel
// e vanno riscalati con lo zoom, altrimenti la mappa satura da lontano
// e si sgrana da vicino
function creaHeatmap(gradiente){
  return dati=>{
    const raggio=z=>Math.max(14,Math.min(52,(z-7.5)*5.5));
    const z0=mappa.getZoom()||13;
    const h=L.heatLayer(dati,{
      radius:raggio(z0),blur:raggio(z0)*.75, // nuclei piu definiti
      maxZoom:16,     // normalizzazione: intensita piu piena ai livelli di zoom tipici
      minOpacity:0,   // le zone a bassa densita restano trasparenti
      gradient:gradiente
    });
    h._quanti=dati.length;
    mappa.on('zoomend',()=>{
      if(h._map) h.setOptions({radius:raggio(mappa.getZoom()),blur:raggio(mappa.getZoom())*.75});
    });
    return h;
  };
}

// ---------- linee di trasporto singole ----------
// su OSM ogni linea (bus 68, tram 10...) e una relazione route=*,
// di solito una per direzione: si raggruppa per "ref" e si scaricano
// le geometrie solo della linea scelta
const selModo=document.getElementById('selModo');
const selLinea=document.getElementById('selLinea');
const btnMostraLinea=document.getElementById('btnMostraLinea');
const lineeAttiveEl=document.getElementById('lineeAttive');
const elenchi={};          // modo -> [{ref,label,ids}]
const lineeSingole={};     // chiave modo:ref -> {layer,riga}
let contaColoriLinee=0;

function estraiLineeRel(el){
  const out=[];
  el.forEach(x=>{
    if(x.type==='relation'&&x.members) x.members.forEach(m=>{
      if(m.type==='way'&&m.geometry&&m.geometry.length>1)
        out.push(m.geometry.map(g=>[+g.lat.toFixed(5),+g.lon.toFixed(5)]));
    });
  });
  return out;
}

async function caricaElencoLinee(modo){
  if(elenchi[modo]){ popolaSelLinea(modo); return; }
  // cache anche per gli elenchi
  try{
    const c=JSON.parse(localStorage.getItem('elenco_linee_'+modo)||'null');
    if(c && Date.now()-c.t < 30*24*3600*1000){ elenchi[modo]=c.d; popolaSelLinea(modo); return; }
  }catch(e){}
  selLinea.innerHTML='<option>Carico l\u2019elenco\u2026</option>';
  try{
    const q='[out:json][timeout:30];relation["route"="'+modo+'"]'+BBOX+';out tags qt;';
    const r=await fetch('https://overpass-api.de/api/interpreter',{
      method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'data='+encodeURIComponent(q)
    });
    const j=await r.json();
    const perRef={};
    j.elements.forEach(e=>{
      const t=e.tags||{};
      const ref=t.ref||t.name||('#'+e.id);
      if(!perRef[ref]) perRef[ref]={ref,ids:[],nome:t.name||''};
      perRef[ref].ids.push(e.id);
      if(t.name && (!perRef[ref].nome || t.name.length<perRef[ref].nome.length)) perRef[ref].nome=t.name;
    });
    elenchi[modo]=Object.values(perRef)
      .map(x=>({ref:x.ref,ids:x.ids,label:(x.ref+(x.nome&&x.nome!==x.ref?' \u2013 '+x.nome:'')).slice(0,48)}))
      .sort((a,b)=>a.ref.localeCompare(b.ref,'it',{numeric:true}));
    try{localStorage.setItem('elenco_linee_'+modo,JSON.stringify({t:Date.now(),d:elenchi[modo]}));}catch(e){}
    popolaSelLinea(modo);
  }catch(e){
    selLinea.innerHTML='<option>Elenco non caricato, riprova</option>';
  }
}
function popolaSelLinea(modo){
  selLinea.innerHTML='';
  if(!elenchi[modo]||!elenchi[modo].length){
    selLinea.add(new Option('Nessuna linea trovata',''));
    return;
  }
  elenchi[modo].forEach((l,i)=>selLinea.add(new Option(l.label,i)));
}
selModo.onchange=()=>caricaElencoLinee(selModo.value);
// primo caricamento dell'elenco quando si apre la sezione
document.querySelector('[data-corpo="corpoLinee"]').addEventListener('click',function primo(){
  caricaElencoLinee(selModo.value);
  this.removeEventListener('click',primo);
});

btnMostraLinea.onclick=async()=>{
  const modo=selModo.value;
  const voce=elenchi[modo]&&elenchi[modo][selLinea.value];
  if(!voce) return;
  const chiave=modo+':'+voce.ref;
  if(lineeSingole[chiave]){ mostraToast('Linea gi\u00e0 in elenco qui sotto.'); return; }
  // geometria: dalla cache o da Overpass, per id delle relazioni
  let dati=null;
  const kCache='linea_'+modo+'_'+voce.ref;
  try{
    const c=JSON.parse(localStorage.getItem(kCache)||'null');
    if(c && Date.now()-c.t < 30*24*3600*1000) dati=c.d;
  }catch(e){}
  if(!dati){
    mostraToast('Scarico la linea '+voce.ref+'\u2026');
    btnMostraLinea.disabled=true;
    try{
      const q='[out:json][timeout:40];relation(id:'+voce.ids.join(',')+');out geom qt;';
      const r=await fetch('https://overpass-api.de/api/interpreter',{
        method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'data='+encodeURIComponent(q)
      });
      const j=await r.json();
      dati=estraiLineeRel(j.elements);
      try{localStorage.setItem(kCache,JSON.stringify({t:Date.now(),d:dati}));}catch(e){}
    }catch(e){
      btnMostraLinea.disabled=false;
      mostraToast('Download non riuscito: riprova.');
      return;
    }
    btnMostraLinea.disabled=false;
  }
  if(!dati.length){ mostraToast('Geometria non disponibile per questa linea.'); return; }
  const col=COLORI_LISTE[contaColoriLinee++%COLORI_LISTE.length];
  const nomi={bus:'Bus',tram:'Tram',train:'Treno'};
  const nome=nomi[modo]+' '+voce.ref;
  const layer=L.layerGroup(dati.map(pts=>
    L.polyline(pts,{renderer:rendOsm,color:col,weight:3.5,opacity:.85,lineCap:'round'})
      .bindTooltip(nome,{sticky:true})
  )).addTo(mappa);
  // riga nel menu con checkbox e swatch, come le liste
  const lab=document.createElement('label');
  lab.className='riga-toret';
  const chk=document.createElement('input');
  chk.type='checkbox';chk.checked=true;
  chk.onchange=()=>{ chk.checked?layer.addTo(mappa):mappa.removeLayer(layer); };
  const sw=document.createElement('span');
  sw.className='swatch';sw.style.background=col;
  const sp=document.createElement('span');
  sp.textContent=nome;
  lab.appendChild(chk);lab.appendChild(sw);lab.appendChild(sp);
  lineeAttiveEl.appendChild(lab);
  lineeSingole[chiave]={layer,riga:lab};
  mappa.flyToBounds(L.featureGroup(layer.getLayers()).getBounds(),{padding:[40,40],duration:.6});
};

function popolaSelect(s){

function aggiornaTogli(){

function creaTappa(indiceSelezionato){
  const riga=document.createElement('div');
  riga.className='riga-tappa';

  if(indiceSelezionato!==undefined && indiceSelezionato<s.options.length) s.selectedIndex=indiceSelezionato;

function pulisciRotta(){
  if(lineaRotta){ mappa.removeLayer(lineaRotta); lineaRotta=null; }
  btnPulisci.style.display='none';
}
btnPulisci.onclick=()=>{ pulisciRotta(); esitoRotta.innerHTML=''; };

function risolviPunto(val){
  if(val!=='gps'){
    return Promise.resolve(luoghi.find(x=>String(x.id)===val));
  }
  if(gpsMarker){
    const p=gpsMarker.getLatLng();
    return Promise.resolve({id:'gps',nome:'Posizione attuale',lat:p.lat,lng:p.lng});
  }
  return new Promise((ok,ko)=>{
    if(!('geolocation' in navigator)) return ko(new Error('no-geo'));
    navigator.geolocation.getCurrentPosition(
      p=>ok({id:'gps',nome:'Posizione attuale',lat:p.coords.latitude,lng:p.coords.longitude}),
      ()=>ko(new Error('geo-fail')),
      {enableHighAccuracy:true,timeout:12000}
    );
  });
}

btnCalcola.onclick=async()=>{
  const valori=[...tappe.querySelectorAll('select')].map(s=>s.value);
  if(valori.length<2) return;
  // tappe consecutive uguali non hanno senso
  for(let i=1;i<valori.length;i++){
    if(valori[i]===valori[i-1]){
      esitoRotta.innerHTML='Due tappe consecutive coincidono: cambia la tappa '+(i+1)+'.';
      return;
    }
  }
  let punti;
  try{
    esitoRotta.innerHTML='Rilevo i punti\u2026';
    punti=await Promise.all(valori.map(risolviPunto));
  }catch(e){
    esitoRotta.innerHTML='Posizione non disponibile: consenti l\u2019accesso alla posizione (serve HTTPS o localhost).';
    return;
  }
  if(punti.some(p=>!p)) return;
  btnCalcola.disabled=true;
  esitoRotta.innerHTML='Calcolo in corso\u2026';
  const server={foot:'routed-foot',bike:'routed-bike',driving:'routed-car'}[profilo];
  const prof={foot:'foot',bike:'bike',driving:'driving'}[profilo];
  try{
    const coords=punti.map(p=>p.lng+','+p.lat).join(';');
    const url=`https://routing.openstreetmap.de/${server}/route/v1/${prof}/${coords}`
      +'?overview=full&geometries=geojson&alternatives=false&steps=false';
    const r=await fetch(url);
    const dati=await r.json();
    if(dati.code!=='Ok'||!dati.routes||!dati.routes.length) throw new Error(dati.code||'no route');
    const rotta=dati.routes[0];
    pulisciRotta();
    lineaRotta=L.geoJSON({type:'Feature',geometry:rotta.geometry},{
      style:{color:'#0d2440',weight:5,opacity:.85,dashArray:profilo==='foot'?'1 8':null,lineCap:'round'}
    }).addTo(mappa);
    mappa.flyToBounds(lineaRotta.getBounds(),{padding:[50,50],duration:.6});
    const km=(rotta.distance/1000).toFixed(rotta.distance<10000?2:1);
    const min=Math.round(rotta.duration/60);
    const modo={foot:'a piedi',bike:'in bici',driving:'in auto'}[profilo];
    let html=`<strong>${km} km</strong> su strada ${modo}, circa <strong>${min} min</strong><br>`
      +punti.map(p=>p.nome).join(' \u2192 ');
    // dettaglio per tratta se le tappe sono piu di due
    if(rotta.legs && rotta.legs.length>1){
      html+='<br><span style="font-size:.72rem;color:var(--grigio)">'
        +rotta.legs.map((g,i)=>
          `${i+1}. ${punti[i].nome} \u2192 ${punti[i+1].nome}: ${(g.distance/1000).toFixed(2)} km, ${Math.round(g.duration/60)} min`
        ).join('<br>')
        +'</span>';
    }
    esitoRotta.innerHTML=html;
    btnPulisci.style.display='block';
  }catch(e){
    esitoRotta.innerHTML='Calcolo non riuscito: controlla la connessione e riprova.';
  }
  btnCalcola.disabled=false;
};

  80:'\uD83C\uDF26 Rovesci',81:'\uD83C\uDF27 Rovesci',82:'\u26C8 Rovesci forti',85:'\uD83C\uDF28 Rovesci di neve',86:'\uD83C\uDF28 Rovesci di neve',
  95:'\u26C8 Temporale',96:'\u26C8 Temporale',99:'\u26C8 Temporale'};
document.getElementById('chkMeteo').onchange=async e=>{
  if(!e.target.checked){ cartaMeteo.style.display='none'; return; }
  cartaMeteo.style.display='block';
  cartaMeteo.innerHTML='Carico il meteo\u2026';
  try{
    const c=mappa.getCenter();
    const url='https://api.open-meteo.com/v1/forecast?latitude='+c.lat.toFixed(3)+'&longitude='+c.lng.toFixed(3)
      +'&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation'
      +'&hourly=precipitation_probability&forecast_days=1&timezone=auto';
    const r=await fetch(url);
    const j=await r.json();
    const cu=j.current;
    const ora=new Date().getHours();
    const probs=(j.hourly&&j.hourly.precipitation_probability||[]).slice(ora,ora+6);
    const probMax=probs.length?Math.max.apply(null,probs):null;
    cartaMeteo.innerHTML=
      (WMO[cu.weather_code]||'')+' \u00b7 <strong>'+Math.round(cu.temperature_2m)+'\u00b0C</strong>'
      +' (percepiti '+Math.round(cu.apparent_temperature)+'\u00b0)'
      +' \u00b7 vento '+Math.round(cu.wind_speed_10m)+' km/h'
      +(probMax!==null?' \u00b7 pioggia prossime 6h: <strong>'+probMax+'%</strong>':'');
  }catch(err){
    cartaMeteo.innerHTML='Meteo non disponibile: controlla la connessione.';
  }
};

// ---------- radar precipitazioni (RainViewer) ----------
let radarLayer=null;
document.getElementById('chkRadar').onchange=async e=>{
  if(!e.target.checked){
    if(radarLayer){ mappa.removeLayer(radarLayer); radarLayer=null; }
    return;
  }
  try{
    const r=await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const j=await r.json();
    const frame=j.radar&&j.radar.past&&j.radar.past[j.radar.past.length-1];
    if(!frame) throw new Error('no frame');
    radarLayer=L.tileLayer('https://tilecache.rainviewer.com'+frame.path+'/256/{z}/{x}/{y}/2/1_1.png',
      {opacity:.65,zIndex:5,attribution:'RainViewer'}).addTo(mappa);
    const quando=new Date(frame.time*1000);
    mostraToast('Radar delle '+quando.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})
      +' (se non vedi nulla, non sta piovendo).');
  }catch(err){
    e.target.checked=false;
    mostraToast('Radar non disponibile: riprova.');
  }
};

// ---------- isocrone (Valhalla / FOSSGIS) ----------
const selIsoOrig=document.getElementById('selIsoOrig');
const btnIsocrone=document.getElementById('btnIsocrone');
const btnIsoRimuovi=document.getElementById('btnIsoRimuovi');
let isoLayer=null;
function popolaSelIso(){
  selIsoOrig.innerHTML='';
  selIsoOrig.add(new Option('\u25CE Posizione attuale','gps'));
  luoghi.forEach(l=>selIsoOrig.add(new Option(l.nome,l.id)));
}
function rimuoviIsocrone(){
  if(isoLayer){ mappa.removeLayer(isoLayer); isoLayer=null; }
  btnIsoRimuovi.style.display='none';
}
btnIsoRimuovi.onclick=rimuoviIsocrone;
btnIsocrone.onclick=async()=>{
  let p;
  try{ p=await risolviPunto(selIsoOrig.value); }
  catch(e){
    esitoRotta.innerHTML='Posizione non disponibile: consenti l\u2019accesso alla posizione.';
    return;
  }
  if(!p) return;
  btnIsocrone.disabled=true;
  esitoRotta.innerHTML='Calcolo le isocrone\u2026';
  const costing={foot:'pedestrian',bike:'bicycle',driving:'auto'}[profilo];
  try{
    const q={locations:[{lat:p.lat,lon:p.lng}],costing:costing,
      contours:[{time:10},{time:20},{time:30}],polygons:true,denoise:.3};
    const r=await fetch('https://valhalla1.openstreetmap.de/isochrone?json='+encodeURIComponent(JSON.stringify(q)));
    const j=await r.json();
    if(!j.features||!j.features.length) throw new Error('no iso');
    rimuoviIsocrone();
    const colori={10:'#2e7d32',20:'#f0a020',30:'#c0392b'};
    isoLayer=L.geoJSON(j,{
      style:f=>({color:colori[f.properties.contour]||'#666',weight:2,
                 fillColor:colori[f.properties.contour]||'#666',fillOpacity:.1})
    }).addTo(mappa);
    isoLayer.eachLayer(ly=>ly.bindTooltip(ly.feature.properties.contour+' min',{sticky:true}));
    mappa.flyToBounds(isoLayer.getBounds(),{padding:[40,40],duration:.6});
    const modo={foot:'a piedi',bike:'in bici',driving:'in auto'}[profilo];
    esitoRotta.innerHTML='Aree raggiungibili '+modo+' da <strong>'+p.nome+'</strong> in 10, 20 e 30 minuti.';
    btnIsoRimuovi.style.display='block';
  }catch(e){
    esitoRotta.innerHTML='Isocrone non disponibili al momento: riprova.';
  }
  btnIsocrone.disabled=false;
};

// ---------- tracciati GPX ----------
const CHIAVE_GPX='torino_quartieri_gpx';
let tracce=[];
try{ tracce=JSON.parse(localStorage.getItem(CHIAVE_GPX)||'[]'); }catch(e){}
function salvaTracce(){
  try{ localStorage.setItem(CHIAVE_GPX,JSON.stringify(tracce)); }
  catch(e){ mostraToast('Traccia troppo grande per il salvataggio: rester\u00e0 solo per questa sessione.'); }
}
const layerTracce={};   // id -> layer
let contaColoriGpx=0;

function distanzaTraccia(pts){
  // haversine cumulativa in km
  let d=0;
  for(let i=1;i<pts.length;i++){
    const [la1,lo1]=pts[i-1],[la2,lo2]=pts[i];
    const p=Math.PI/180, a=Math.sin((la2-la1)*p/2)**2
      +Math.cos(la1*p)*Math.cos(la2*p)*Math.sin((lo2-lo1)*p/2)**2;
    d+=12742*Math.asin(Math.sqrt(a));
  }
  return d;
}
function disegnaTraccia(t,vola){
  if(layerTracce[t.id]) mappa.removeLayer(layerTracce[t.id]);
  const lay=L.layerGroup(t.segmenti.map(seg=>
    L.polyline(seg,{color:t.colore,weight:3.5,opacity:.85,lineCap:'round'})
      .bindTooltip(t.nome,{sticky:true})
  )).addTo(mappa);
  layerTracce[t.id]=lay;
  if(vola){
    const b=L.featureGroup(lay.getLayers()).getBounds();
    if(b.isValid()) mappa.flyToBounds(b,{padding:[40,40],duration:.6});
  }
}
function rigeneraRigheGpx(){
  const cont=document.getElementById('righeGpx');
  cont.innerHTML='';
  if(!tracce.length){
    cont.innerHTML='<div class="titolo-sez" style="font-weight:400;text-transform:none;letter-spacing:0">Nessun tracciato importato.</div>';
    return;
  }
  tracce.forEach(t=>{
    const lab=document.createElement('label');
    lab.className='riga-toret';
    const chk=document.createElement('input');
    chk.type='checkbox';
    chk.checked=!!layerTracce[t.id];
    chk.onchange=()=>{
      if(chk.checked) disegnaTraccia(t,true);
      else if(layerTracce[t.id]){ mappa.removeLayer(layerTracce[t.id]); delete layerTracce[t.id]; }
    };
    const sw=document.createElement('span');
    sw.className='swatch';sw.style.background=t.colore;
    const sp=document.createElement('span');
    sp.innerHTML=t.nome+'<span class="desc">'+t.km.toFixed(1)+' km \u00b7 '+t.punti+' punti</span>';
    const x=document.createElement('button');
    x.type='button';x.className='togli';x.innerHTML='&times;';
    x.title='Elimina tracciato';
    x.style.marginLeft='auto';
    x.onclick=ev=>{
      ev.preventDefault();ev.stopPropagation();
      if(layerTracce[t.id]){ mappa.removeLayer(layerTracce[t.id]); delete layerTracce[t.id]; }
      tracce=tracce.filter(z=>z.id!==t.id);
      salvaTracce(); rigeneraRigheGpx();
    };
    lab.appendChild(chk);lab.appendChild(sw);lab.appendChild(sp);lab.appendChild(x);
    cont.appendChild(lab);
  });
}
rigeneraRigheGpx();

document.getElementById('btnImportaGpx').onclick=()=>document.getElementById('fileGpx').click();
document.getElementById('fileGpx').onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const xml=new DOMParser().parseFromString(rd.result,'application/xml');
      if(xml.querySelector('parsererror')) throw new Error('xml');
      // segmenti: trkseg se presenti, altrimenti rte (rotta)
      let segmenti=[];
      const trksegs=xml.querySelectorAll('trkseg');
      const contenitori=trksegs.length?trksegs:xml.querySelectorAll('rte');
      const selettore=trksegs.length?'trkpt':'rtept';
      contenitori.forEach(seg=>{
        const pts=[...seg.querySelectorAll(selettore)]
          .map(p=>[parseFloat(p.getAttribute('lat')),parseFloat(p.getAttribute('lon'))])
          .filter(c=>isFinite(c[0])&&isFinite(c[1]));
        if(pts.length>1) segmenti.push(pts);
      });
      if(!segmenti.length) throw new Error('vuoto');
      // semplificazione: massimo ~3000 punti totali, per localStorage e resa fluida
      const totale=segmenti.reduce((s,x)=>s+x.length,0);
      if(totale>3000){
        const passo=Math.ceil(totale/3000);
        segmenti=segmenti.map(seg=>seg.filter((_,i)=>i%passo===0 || i===seg.length-1));
      }
      const tutti=segmenti.flat();
      const nome=(xml.querySelector('trk > name, rte > name, metadata > name')||{}).textContent
        || f.name.replace(/\.gpx$/i,'');
      const t={
        id:'g'+Date.now(),
        nome:nome.trim().slice(0,40),
        colore:COLORI_LISTE[contaColoriGpx++%COLORI_LISTE.length],
        segmenti:segmenti.map(seg=>seg.map(c=>[+c[0].toFixed(5),+c[1].toFixed(5)])),
        km:distanzaTraccia(tutti),
        punti:tutti.length
      };
      tracce.push(t); salvaTracce();
      disegnaTraccia(t,true);
      rigeneraRigheGpx();
      chiudiVista();
      mostraToast('Tracciato \u201c'+t.nome+'\u201d importato: '+t.km.toFixed(1)+' km.');
    }catch(err){
      mostraToast('File GPX non valido o senza punti traccia.');
    }
    e.target.value='';
  };
  rd.readAsText(f);
};

// ---------- ricerca tra i filtri ----------
document.getElementById('cercaFiltri').oninput=e=>{
  const q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('#vistaLivelli .sezione').forEach(sezEl=>{
    const btn=sezEl.querySelector('.titolo-sez.collass');
    const corpo=sezEl.querySelector('.corpo-sez');
    if(!btn||!corpo) return;
    let visibili=0;
    corpo.querySelectorAll('.riga-toret, .voce').forEach(r=>{
      const match=!q||r.textContent.toLowerCase().includes(q);
      r.style.display=match?'':'none';
      if(match) visibili++;
    });
    if(q){
      // durante la ricerca: espande le sezioni con risultati, nasconde le altre
      sezEl.style.display=visibili?'':'none';
      corpo.classList.toggle('chiuso',!visibili);
      btn.setAttribute('aria-expanded',!!visibili);
    }else{
      sezEl.style.display='';
      corpo.classList.add('chiuso');
      btn.setAttribute('aria-expanded','false');
    }
  });
};

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saldo wallet Bitcoin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f5f0e6;
    --paper-2: #efe8da;
    --ink: #1b1713;
    --muted: #8c8071;
    --hair: #ddd3c2;
    --amber: #d9730d;
    --amber-soft: #f6e4cd;
    --in: #5d7a4d;
    --out: #b4502f;
    --shadow: 0 1px 0 rgba(27,23,19,.04), 0 18px 40px -28px rgba(27,23,19,.45);
    --display: "Space Grotesk", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(120% 80% at 50% -10%, var(--paper-2), var(--paper) 60%);
    color: var(--ink);
    font-family: var(--display);
    line-height: 1.5;
    display: flex;
    justify-content: center;
    padding: clamp(16px, 4vw, 48px) clamp(14px, 4vw, 24px) 64px;
  }

  .sheet { width: 100%; max-width: 620px; }

  /* ---- header ---- */
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 14px;
  }
  .mark {
    width: 26px; height: 26px; flex: none;
    border-radius: 50%;
    background: var(--amber);
    color: var(--paper);
    display: grid; place-items: center;
    font-weight: 700; font-size: 16px;
    font-family: var(--display);
    box-shadow: 0 4px 12px -4px rgba(217,115,13,.7);
  }
  h1 {
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 600;
    letter-spacing: -.02em;
    margin: 0 0 22px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sub { color: var(--muted); margin: 0 0 26px; font-size: 15px; }

  /* ---- search ---- */
  .search {
    display: flex;
    gap: 8px;
    background: #fff;
    border: 1px solid var(--hair);
    border-radius: 14px;
    padding: 8px;
    box-shadow: var(--shadow);
  }
  .search input {
    flex: 1;
    min-width: 0;
    border: 0;
    background: transparent;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink);
    padding: 10px 12px;
  }
  .search input::placeholder { color: #b8ad9c; }
  .search input:focus { outline: none; }
  .search button {
    flex: none;
    border: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--display);
    font-weight: 600;
    font-size: 14px;
    padding: 0 18px;
    border-radius: 9px;
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .search button:hover { background: #000; }
  .search button:active { transform: translateY(1px); }
  .search:focus-within { border-color: var(--amber); }

  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 14px 2px 0;
    align-items: center;
  }
  .examples span { font-size: 13px; color: var(--muted); margin-right: 2px; }
  .chip {
    border: 1px dashed var(--hair);
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .chip:hover { border-color: var(--amber); color: var(--amber); }

  /* ---- saved addresses ---- */
  #saved:not(:empty) { margin-top: 22px; }
  .saved-head {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 11px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--muted); margin: 0 2px 10px;
  }
  .saved-list { display: flex; flex-direction: column; gap: 8px; }
  .saved-item {
    display: flex; align-items: center; gap: 10px;
    background: #fff; border: 1px solid var(--hair);
    border-radius: 12px; padding: 10px 10px 10px 14px;
    box-shadow: var(--shadow);
    transition: border-color .15s;
  }
  .saved-item.active { border-color: var(--amber); }
  .saved-main { flex: 1; min-width: 0; cursor: pointer; }
  .saved-label {
    border: 0; background: transparent; width: 100%;
    font-family: var(--display); font-weight: 600; font-size: 14px;
    color: var(--ink); padding: 0; margin-bottom: 1px;
  }
  .saved-label::placeholder { color: #b8ad9c; font-weight: 500; }
  .saved-label:focus { outline: none; color: var(--amber); }
  .saved-addr {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
  }
  .saved-load, .saved-del {
    flex: none; border: 1px solid var(--hair); background: var(--paper);
    border-radius: 8px; cursor: pointer; font-family: var(--mono);
    color: var(--muted); transition: color .15s, border-color .15s;
  }
  .saved-load { font-size: 11px; letter-spacing: .04em; padding: 6px 10px; }
  .saved-load:hover { color: var(--amber); border-color: var(--amber); }
  .saved-del { width: 30px; height: 30px; font-size: 16px; line-height: 1; }
  .saved-del:hover { color: var(--out); border-color: var(--out); }

  .save-btn {
    border: 1px solid var(--hair); background: var(--paper);
    color: var(--muted); font-family: var(--mono);
    font-size: 11px; letter-spacing: .04em; padding: 5px 9px;
    border-radius: 7px; cursor: pointer; flex: none;
  }
  .save-btn:hover { color: var(--ink); border-color: var(--muted); }
  .save-btn.on { color: var(--amber); border-color: var(--amber); background: var(--amber-soft); }

  /* ---- states ---- */
  .state {
    margin-top: 30px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .state.error {
    border: 1px solid #e7c4b6;
    background: #fbeee8;
    color: var(--out);
    border-radius: 12px;
    padding: 16px;
    text-align: left;
    font-size: 14px;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--hair);
    border-top-color: var(--amber);
    border-radius: 50%;
    margin: 0 auto 10px;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- results ---- */
  #out { margin-top: 28px; }
  .reveal { animation: rise .4s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .card {
    background: #fff;
    border: 1px solid var(--hair);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 22px;
    margin-bottom: 16px;
  }

  .addr-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .addr {
    font-family: var(--mono);
    font-size: 13px;
    word-break: break-all;
    color: var(--muted);
    flex: 1;
    min-width: 0;
  }
  .copy {
    border: 1px solid var(--hair);
    background: var(--paper);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .04em;
    padding: 5px 9px;
    border-radius: 7px;
    cursor: pointer;
    flex: none;
  }
  .copy:hover { color: var(--ink); border-color: var(--muted); }

  .balance-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 18px 0 6px;
  }
  .balance {
    font-family: var(--mono);
    font-weight: 700;
    font-size: clamp(30px, 9vw, 46px);
    letter-spacing: -.02em;
    line-height: 1;
    word-break: break-word;
  }
  .balance .unit { color: var(--amber); font-size: .5em; margin-left: 8px; letter-spacing: 0; }
  .fiat { color: var(--muted); font-family: var(--mono); font-size: 15px; margin-top: 8px; }
  .pending {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--amber);
    background: var(--amber-soft);
    border-radius: 8px;
    padding: 8px 12px;
    display: inline-block;
  }

  /* receipt-style leader lines (the signature) */
  .lines { display: flex; flex-direction: column; gap: 13px; }
  .line { display: flex; align-items: baseline; gap: 6px; font-size: 14px; }
  .line .k { color: var(--muted); white-space: nowrap; }
  .line .lead { flex: 1; border-bottom: 1.5px dotted var(--hair); transform: translateY(-4px); min-width: 12px; }
  .line .v { font-family: var(--mono); font-weight: 500; white-space: nowrap; }

  .sec-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 2px 0 16px;
  }

  .tx {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 0;
    border-top: 1px solid var(--hair);
  }
  .tx:first-of-type { border-top: 0; padding-top: 0; }
  .tx-ico {
    flex: none;
    width: 30px; height: 30px;
    border-radius: 8px;
    display: grid; place-items: center;
    font-family: var(--mono); font-weight: 700; font-size: 15px;
  }
  .tx-ico.in { background: #e7efe2; color: var(--in); }
  .tx-ico.out { background: #f6e3db; color: var(--out); }
  .tx-mid { flex: 1; min-width: 0; }
  .tx-id {
    font-family: var(--mono); font-size: 12px;
    color: var(--ink); text-decoration: none;
    display: inline-block; word-break: break-all;
  }
  .tx-id:hover { color: var(--amber); }
  .tx-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .tx-amt { flex: none; text-align: right; font-family: var(--mono); font-size: 13px; font-weight: 500; }
  .tx-amt.in { color: var(--in); }
  .tx-amt.out { color: var(--out); }
  .tx-amt small { display: block; color: var(--muted); font-weight: 400; font-size: 11px; }
  .badge-pending {
    font-family: var(--mono); font-size: 10px; letter-spacing: .04em;
    color: var(--amber); border: 1px solid var(--amber);
    border-radius: 4px; padding: 0 4px; margin-left: 6px;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 26px;
    line-height: 1.7;
  }
  footer a { color: var(--muted); }

  @media (max-width: 420px) {
    .card { padding: 18px; }
    .search button { padding: 0 14px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .reveal, .spinner { animation: none; }
  }
  :focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; border-radius: 4px; }
</style>
</head>
<body>
  <main class="sheet">
    <h1 class="title"><span class="mark">₿</span> Saldo wallet Bitcoin</h1>

    <div class="search">
      <input id="addr" type="text" inputmode="text" autocomplete="off" spellcheck="false"
             placeholder="bc1q… · 3… · 1…" aria-label="Indirizzo Bitcoin" />
      <button id="go">Leggi</button>
    </div>

    <div id="saved"></div>

    <div id="out"></div>

    <footer>Dati on-chain via Blockstream · prezzo CoinGecko</footer>
  </main>

<script>
const API = "https://blockstream.info/api";
const SAT = 1e8;
const out = document.getElementById("out");
const input = document.getElementById("addr");
let priceEur = null;

const fmtBtc = (sats) => (sats / SAT).toLocaleString("it-IT", { minimumFractionDigits: 8, maximumFractionDigits: 8 });
const fmtEur = (v) => v.toLocaleString("it-IT", { style: "currency", currency: "EUR" });
const fmtInt = (n) => n.toLocaleString("it-IT");

function addrType(a) {
  if (a.startsWith("bc1p")) return "Taproot (P2TR)";
  if (a.startsWith("bc1")) return "SegWit nativo (Bech32)";
  if (a.startsWith("3")) return "SegWit annidato (P2SH)";
  if (a.startsWith("1")) return "Legacy (P2PKH)";
  if (a.startsWith("tb1") || a.startsWith("m") || a.startsWith("n") || a.startsWith("2")) return "Testnet";
  return "Sconosciuto";
}

function timeAgo(ts) {
  if (!ts) return "in attesa";
  const s = Math.floor(Date.now() / 1000 - ts);
  if (s < 60) return "ora";
  const m = Math.floor(s / 60); if (m < 60) return `${m} min fa`;
  const h = Math.floor(m / 60); if (h < 24) return `${h} h fa`;
  const d = Math.floor(h / 24); if (d < 30) return `${d} g fa`;
  const mo = Math.floor(d / 30); if (mo < 12) return `${mo} mesi fa`;
  return `${Math.floor(mo / 12)} anni fa`;
}

function txDelta(tx, addr) {
  let v = 0;
  for (const o of tx.vout || []) if (o.scriptpubkey_address === addr) v += o.value;
  for (const i of tx.vin || []) if (i.prevout && i.prevout.scriptpubkey_address === addr) v -= i.prevout.value;
  return v;
}

function showState(html, cls = "") {
  out.innerHTML = `<div class="state ${cls}">${html}</div>`;
}

async function fetchPrice() {
  try {
    const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur");
    if (r.ok) priceEur = (await r.json()).bitcoin.eur;
  } catch (_) { /* prezzo opzionale: si ignora */ }
}

async function lookup(addr) {
  addr = addr.trim();
  if (!addr) { input.focus(); return; }
  input.value = addr;
  showState('<div class="spinner"></div>Lettura dalla blockchain…');

  try {
    const [statsRes, txRes] = await Promise.all([
      fetch(`${API}/address/${addr}`),
      fetch(`${API}/address/${addr}/txs`)
    ]);

    if (statsRes.status === 400 || statsRes.status === 404) {
      showState(`Indirizzo non valido o senza dati on-chain.<br>Controlla di aver incollato un indirizzo Bitcoin mainnet completo.`, "error");
      return;
    }
    if (!statsRes.ok) throw new Error("HTTP " + statsRes.status);

    const stats = await statsRes.json();
    const txs = txRes.ok ? await txRes.json() : [];
    render(addr, stats, txs);
  } catch (e) {
    showState(`Non riesco a contattare il servizio. Verifica la connessione e riprova.<br><small>${e.message}</small>`, "error");
  }
}

function render(addr, s, txs) {
  const c = s.chain_stats, m = s.mempool_stats;
  const confirmed = c.funded_txo_sum - c.spent_txo_sum;
  const pending = m.funded_txo_sum - m.spent_txo_sum;
  const utxo = (c.funded_txo_count - c.spent_txo_count) + (m.funded_txo_count - m.spent_txo_count);
  const txCount = c.tx_count + m.tx_count;

  const fiatLine = priceEur !== null
    ? `<div class="fiat">≈ ${fmtEur(confirmed / SAT * priceEur)} &nbsp;·&nbsp; 1 BTC = ${fmtEur(priceEur)}</div>` : "";

  const pendingLine = pending !== 0
    ? `<div class="pending">In attesa: ${pending > 0 ? "+" : ""}${fmtBtc(pending)} BTC</div>` : "";

  const txList = txs.length ? txs.slice(0, 15).map(tx => {
    const d = txDelta(tx, addr);
    const dir = d >= 0 ? "in" : "out";
    const ts = tx.status && tx.status.block_time;
    const height = tx.status && tx.status.confirmed ? `blocco ${fmtInt(tx.status.block_height)}` : "mempool";
    const pend = !(tx.status && tx.status.confirmed) ? '<span class="badge-pending">PENDING</span>' : "";
    const eur = priceEur !== null ? `<small>${fmtEur(Math.abs(d) / SAT * priceEur)}</small>` : "";
    return `
      <div class="tx">
        <div class="tx-ico ${dir}">${d >= 0 ? "↓" : "↑"}</div>
        <div class="tx-mid">
          <a class="tx-id" href="https://blockstream.info/tx/${tx.txid}" target="_blank" rel="noopener">${tx.txid.slice(0,16)}…${tx.txid.slice(-6)}</a>${pend}
          <div class="tx-meta">${height} · ${timeAgo(ts)}</div>
        </div>
        <div class="tx-amt ${dir}">${d >= 0 ? "+" : "−"}${fmtBtc(Math.abs(d))}${eur}</div>
      </div>`;
  }).join("") : `<div class="state">Nessuna transazione trovata.</div>`;

  out.innerHTML = `
    <div class="reveal">
      <div class="card">
        <div class="addr-row">
          <span class="addr">${addr}</span>
          <button class="save-btn" id="save">★ Salva</button>
          <button class="copy" id="copy">COPIA</button>
        </div>
        <div class="balance-label">Saldo confermato</div>
        <div class="balance">${fmtBtc(confirmed)}<span class="unit">BTC</span></div>
        ${fiatLine}
        ${pendingLine}
      </div>

      <div class="card">
        <div class="lines">
          <div class="line"><span class="k">Totale ricevuto</span><span class="lead"></span><span class="v">${fmtBtc(c.funded_txo_sum)} BTC</span></div>
          <div class="line"><span class="k">Totale inviato</span><span class="lead"></span><span class="v">${fmtBtc(c.spent_txo_sum)} BTC</span></div>
          <div class="line"><span class="k">Transazioni</span><span class="lead"></span><span class="v">${fmtInt(txCount)}</span></div>
          <div class="line"><span class="k">UTXO non spesi</span><span class="lead"></span><span class="v">${fmtInt(utxo)}</span></div>
          <div class="line"><span class="k">Tipo indirizzo</span><span class="lead"></span><span class="v">${addrType(addr)}</span></div>
        </div>
      </div>

      <div class="card">
        <div class="sec-title">Movimenti recenti${txs.length > 15 ? " · ultimi 15" : ""}</div>
        ${txList}
      </div>
    </div>`;

  const copyBtn = document.getElementById("copy");
  copyBtn.addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(addr); copyBtn.textContent = "COPIATO"; setTimeout(() => copyBtn.textContent = "COPIA", 1200); } catch (_) {}
  });

  const saveBtn = document.getElementById("save");
  const syncSaveBtn = () => {
    const on = isSaved(addr);
    saveBtn.classList.toggle("on", on);
    saveBtn.textContent = on ? "★ Salvato" : "★ Salva";
  };
  syncSaveBtn();
  saveBtn.addEventListener("click", () => {
    if (isSaved(addr)) removeSaved(addr); else addSaved(addr);
    syncSaveBtn();
    renderSaved();
  });

  renderSaved();
}

/* ---------- indirizzi salvati (persistenza locale) ---------- */
const STORE_KEY = "btc_saved_addresses_v1";
const savedBox = document.getElementById("saved");
let savedList = loadSaved();

function loadSaved() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch (_) { return []; }
}
function persist() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(savedList)); }
  catch (_) { /* storage non disponibile: resta valido per la sessione */ }
}
function isSaved(addr) { return savedList.some(x => x.address === addr); }
function addSaved(addr) {
  if (!isSaved(addr)) { savedList.unshift({ address: addr, label: "", ts: Date.now() }); persist(); }
}
function removeSaved(addr) { savedList = savedList.filter(x => x.address !== addr); persist(); }
function renameSaved(addr, label) {
  const it = savedList.find(x => x.address === addr);
  if (it) { it.label = label; persist(); }
}

function renderSaved() {
  if (!savedList.length) { savedBox.innerHTML = ""; return; }
  const current = (input.value || "").trim();
  savedBox.innerHTML = `
    <div class="saved-head"><span>I tuoi indirizzi · ${savedList.length}</span></div>
    <div class="saved-list">
      ${savedList.map(it => `
        <div class="saved-item ${it.address === current ? "active" : ""}" data-a="${it.address}">
          <div class="saved-main">
            <input class="saved-label" value="${(it.label || "").replace(/"/g, "&quot;")}"
                   placeholder="Aggiungi un'etichetta…" aria-label="Etichetta" />
            <div class="saved-addr" title="${it.address}">${it.address.slice(0, 12)}…${it.address.slice(-8)} · ${addrType(it.address)}</div>
          </div>
          <button class="saved-load" data-load="${it.address}">Carica</button>
          <button class="saved-del" data-del="${it.address}" aria-label="Rimuovi">×</button>
        </div>`).join("")}
    </div>`;

  savedBox.querySelectorAll(".saved-label").forEach(inp => {
    const addr = inp.closest(".saved-item").dataset.a;
    inp.addEventListener("change", () => renameSaved(addr, inp.value.trim()));
    inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); });
  });
  savedBox.querySelectorAll("[data-load]").forEach(b =>
    b.addEventListener("click", () => lookup(b.dataset.load)));
  savedBox.querySelectorAll(".saved-addr").forEach(el =>
    el.addEventListener("click", () => lookup(el.closest(".saved-item").dataset.a)));
  savedBox.querySelectorAll("[data-del]").forEach(b =>
    b.addEventListener("click", () => { removeSaved(b.dataset.del); renderSaved(); }));
}

document.getElementById("go").addEventListener("click", () => lookup(input.value));
input.addEventListener("keydown", e => { if (e.key === "Enter") lookup(input.value); });

renderSaved();
fetchPrice();
</script>
</body>
</html>

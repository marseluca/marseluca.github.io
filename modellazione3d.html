<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luca — Modellazione 3D</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .eyebrow { color: var(--c-modello3d); }
    .form-card { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; margin-bottom: 1.5rem; }
    .form-card .full { grid-column: 1 / -1; }
    .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
    .chip {
      border: 1px solid var(--line); background: var(--surface); color: var(--muted);
      border-radius: 999px; padding: 0.35rem 0.8rem; font-size: 0.85rem; font-weight: 500; cursor: pointer;
    }
    .chip[aria-pressed="true"] { background: var(--c-modello3d); border-color: var(--c-modello3d); color: #fff; }
    .stat .n { color: var(--c-modello3d); }
    .badge.st-idea     { background: #f0ecfa; color: var(--c-modello3d); }
    .badge.st-corso    { background: #fff3e0; color: var(--c-bitcoin); }
    .badge.st-completato { background: #e7f3ee; color: var(--c-allenamenti); }
    .badge.soft { background: var(--line); color: var(--muted); }
    .proj-title { font-family: var(--display); font-weight: 600; }
    @media (max-width: 560px) { .form-card { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="index.html">Luca</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="ricette.html">Ricette</a></li>
      <li><a href="bitcoin.html">Bitcoin</a></li>
      <li><a href="allenamenti.html">Allenamenti</a></li>
      <li><a href="libri.html">Libri</a></li>
      <li><a href="modellazione3d.html" aria-current="page">Modellazione 3D</a></li>
    </ul>
  </nav>

  <main class="wrap">
    <header class="page-head">
      <p class="eyebrow">Officina</p>
      <h1 class="title">Modellazione 3D</h1>
      <p class="lead">I miei progetti 3D: idee, lavori in corso e modelli finiti.</p>
    </header>

    <div class="stats">
      <div class="stat"><div class="n" id="s-total">0</div><div class="l">Progetti totali</div></div>
      <div class="stat"><div class="n" id="s-corso">0</div><div class="l">In corso</div></div>
      <div class="stat"><div class="n" id="s-done">0</div><div class="l">Completati</div></div>
    </div>

    <div class="card form-card">
      <div class="field">
        <label for="name">Nome progetto</label>
        <input id="name" type="text" placeholder="Es. Portachiavi parametrico" />
      </div>
      <div class="field">
        <label for="software">Software</label>
        <input id="software" type="text" placeholder="Blender, Fusion 360, Tinkercad…" />
      </div>
      <div class="field">
        <label for="status">Stato</label>
        <select id="status">
          <option value="idea">Idea</option>
          <option value="corso">In corso</option>
          <option value="completato">Completato</option>
        </select>
      </div>
      <div class="field">
        <label for="link">Link (opzionale)</label>
        <input id="link" type="url" placeholder="https://… file o render" />
      </div>
      <div class="field full">
        <label for="notes">Note (tecnica, materiali, idee…)</label>
        <textarea id="notes" placeholder="Es. stampa in PLA, supporti minimi, da rifinire le smussature"></textarea>
      </div>
      <div class="full">
        <button class="btn btn-accent" id="add" style="background: var(--c-modello3d); border-color: var(--c-modello3d)">Aggiungi progetto</button>
      </div>
    </div>

    <div class="filters" id="filters">
      <button class="chip" data-f="all" aria-pressed="true">Tutti</button>
      <button class="chip" data-f="idea" aria-pressed="false">Idee</button>
      <button class="chip" data-f="corso" aria-pressed="false">In corso</button>
      <button class="chip" data-f="completato" aria-pressed="false">Completati</button>
    </div>

    <div id="list"></div>
    <div id="empty" class="empty">Ancora nessun progetto. Aggiungi il primo qui sopra.</div>
  </main>

  <footer class="site">&copy; <span id="y"></span> Luca</footer>

  <script>
    const KEY = "luca_modellazione3d";
    const store = {
      mem: [],
      load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return this.mem; } },
      save(d) { this.mem = d; try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {} }
    };

    let items = store.load();
    let filter = "all";

    const LABEL = { idea: "Idea", corso: "In corso", completato: "Completato" };
    const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

    function updateStats() {
      document.getElementById("s-total").textContent = items.length;
      document.getElementById("s-corso").textContent = items.filter(i => i.status === "corso").length;
      document.getElementById("s-done").textContent = items.filter(i => i.status === "completato").length;
    }

    function render() {
      const shown = items.filter(p => filter === "all" || p.status === filter);
      document.getElementById("empty").hidden = items.length > 0;
      document.getElementById("list").innerHTML = shown.map(p => `
        <div class="row">
          <div>
            <span class="proj-title">${esc(p.name)}</span>
            ${p.software ? `<span class="meta"> · ${esc(p.software)}</span>` : ""}
            <div style="margin-top:0.5rem; display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap">
              <span class="badge st-${p.status}">${LABEL[p.status]}</span>
              ${p.link ? `<a class="badge soft" href="${esc(p.link)}" target="_blank" rel="noopener">apri link ↗</a>` : ""}
            </div>
            ${p.notes ? `<div style="margin-top:0.5rem">${esc(p.notes)}</div>` : ""}
          </div>
          <button class="btn-ghost" data-id="${p.id}">elimina</button>
        </div>
      `).join("");
      if (shown.length === 0 && items.length > 0) {
        document.getElementById("list").innerHTML = `<div class="empty">Nessun progetto in questa categoria.</div>`;
      }
      updateStats();
    }

    document.getElementById("add").addEventListener("click", () => {
      const name = document.getElementById("name").value.trim();
      if (!name) { document.getElementById("name").focus(); return; }
      items.push({
        id: Date.now().toString(36),
        name,
        software: document.getElementById("software").value.trim(),
        status: document.getElementById("status").value,
        link: document.getElementById("link").value.trim(),
        notes: document.getElementById("notes").value.trim()
      });
      store.save(items);
      ["name", "software", "link", "notes"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("status").value = "idea";
      render();
    });

    document.getElementById("list").addEventListener("click", e => {
      const btn = e.target.closest("[data-id]");
      if (!btn) return;
      items = items.filter(p => p.id !== btn.dataset.id);
      store.save(items);
      render();
    });

    document.getElementById("filters").addEventListener("click", e => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      filter = chip.dataset.f;
      [...document.querySelectorAll(".chip")].forEach(c => c.setAttribute("aria-pressed", c === chip));
      render();
    });

    document.getElementById("y").textContent = new Date().getFullYear();
    render();
  </script>
</body>
</html>
